services:
  - type: web
    name: talentflow-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: APP_NAME
        value: TalentFlow AI API
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_TIMEOUT_SECONDS
        value: "30"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_OAUTH_STATE_SECRET
        sync: false
      - key: GOOGLE_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: EMAIL_COMPANY_NAME
        value: TalentFlow AI
      - key: EMAIL_RECRUITMENT_TEAM_NAME
        value: Talent Acquisition Team
      - key: EMAIL_REPLY_TO
        sync: false
      - key: EMAIL_CAREERS_URL
        sync: false
